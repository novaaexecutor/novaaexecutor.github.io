<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Nova Executor</title>
<link rel="stylesheet" href="style.css">
<style>
html,body{overflow:hidden;height:100%}
.wrap{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center}
.logo-outer{position:relative;width:110px;height:110px;display:flex;align-items:center;justify-content:center}
.logo-ring{position:absolute;inset:-4px;border-radius:32px;background:conic-gradient(from 0deg,var(--acc),var(--acch),var(--accy),var(--acc));animation:spinRing 3s linear infinite;z-index:0}
.logo-inner{position:absolute;inset:-1px;border-radius:30px;background:#000;z-index:1}
.logo-box{position:relative;z-index:2;width:110px;height:110px;border-radius:28px;background:linear-gradient(135deg,var(--acc),var(--acch));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:62px;font-weight:800;color:#fff;box-shadow:0 0 80px rgba(110,80,255,.65),0 0 160px rgba(110,80,255,.2);animation:popIn .9s cubic-bezier(.22,1,.36,1) both,glowPulse 3s 1s ease-in-out infinite}
.title{margin-top:32px;font-family:'Syne',sans-serif;font-size:clamp(44px,7vw,76px);font-weight:800;letter-spacing:-1.5px;color:#eeeeff;text-align:center;line-height:1;animation:fadeUp .8s .15s cubic-bezier(.22,1,.36,1) both}
.subtitle{margin-top:12px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:6px;color:var(--acc);text-transform:uppercase;text-align:center;animation:fadeUp .8s .25s cubic-bezier(.22,1,.36,1) both}
.chips{margin-top:22px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;animation:fadeUp .8s .32s cubic-bezier(.22,1,.36,1) both}
.chip{padding:5px 14px;border-radius:100px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid}
.chip.a{background:rgba(110,80,255,.1);color:var(--acc);border-color:rgba(110,80,255,.3)}
.chip.b{background:rgba(0,232,122,.08);color:#00e87a;border-color:rgba(0,232,122,.25)}
.chip.c{background:rgba(200,255,0,.07);color:var(--accy);border-color:rgba(200,255,0,.25)}
.bar-wrap{margin-top:52px;width:280px;animation:fadeUp .8s .38s cubic-bezier(.22,1,.36,1) both}
.bar-track{height:3px;background:rgba(110,80,255,.12);border-radius:2px;position:relative}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acch));border-radius:2px;width:0%;transition:width .55s cubic-bezier(.4,0,.2,1);position:relative}
.bar-fill::after{content:'';position:absolute;right:-5px;top:-4px;width:11px;height:11px;border-radius:50%;background:var(--acch);box-shadow:0 0 14px var(--acch),0 0 28px rgba(160,90,255,.6)}
.bar-status{margin-top:14px;text-align:center;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(110,80,255,.45);transition:color .3s}
.enter-btn{margin-top:48px;display:inline-flex;align-items:center;gap:12px;padding:16px 48px;border-radius:14px;background:linear-gradient(135deg,var(--acc),var(--acch));color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;text-decoration:none;cursor:none;box-shadow:0 0 60px rgba(110,80,255,.5),inset 0 1px 0 rgba(255,255,255,.18);opacity:0;transform:translateY(22px) scale(.97);transition:opacity .5s,transform .5s,box-shadow .2s;pointer-events:none}
.enter-btn.show{opacity:1;transform:none;pointer-events:auto}
.enter-btn:hover{box-shadow:0 0 100px rgba(110,80,255,.85),inset 0 1px 0 rgba(255,255,255,.18);transform:translateY(-2px)}
.ver{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(110,80,255,.22);text-transform:uppercase;z-index:11;white-space:nowrap}
@keyframes popIn{from{opacity:0;transform:scale(.55)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 80px rgba(110,80,255,.65),0 0 160px rgba(110,80,255,.2)}50%{box-shadow:0 0 110px rgba(160,90,255,.9),0 0 220px rgba(110,80,255,.35)}}
</style>
</head>
<body>
<div id="cd"></div><div id="cr"></div>
<canvas id="bgc"></canvas>
<div class="c-tl"></div><div class="c-br"></div>

<div class="wrap">
  <div class="logo-outer">
    <div class="logo-ring"></div><div class="logo-inner"></div>
    <div class="logo-box">N</div>
  </div>
  <div class="title">NOVA EXECUTOR</div>
  <div class="subtitle">Free &nbsp;·&nbsp; Fast &nbsp;·&nbsp; No Key</div>
  <div class="chips">
    <span class="chip a">v8.0 Latest</span>
    <span class="chip b">Free Forever</span>
    <span class="chip c">No Key System</span>
  </div>
  <div class="bar-wrap">
    <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
    <div class="bar-status" id="stxt">Initializing...</div>
  </div>
  <a href="index.html" class="enter-btn" id="ebtn">Enter Site <span>→</span></a>
</div>
<div class="ver">Nova Executor &nbsp;·&nbsp; v8.0 &nbsp;·&nbsp; Free Forever</div>

<script src="app.js"></script>
<script>
const bar=document.getElementById('bar'),stxt=document.getElementById('stxt'),ebtn=document.getElementById('ebtn');
const steps=[{p:8,t:'Initializing...'},{p:22,t:'Loading assets...'},{p:45,t:'Checking version...'},{p:68,t:'Almost ready...'},{p:88,t:'Finalizing...'},{p:100,t:'Ready!'}];
let si=0;
function ns(){
  if(si>=steps.length)return;
  const s=steps[si++];bar.style.width=s.p+'%';stxt.textContent=s.t;
  if(s.p===100){stxt.style.color='rgba(0,232,122,.7)';setTimeout(()=>ebtn.classList.add('show'),500);}
  else setTimeout(ns,380+Math.random()*280);
}
setTimeout(ns,600);
</script>
</body>
</html>
